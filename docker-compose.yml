services:
  api:
    build:
      dockerfile: .
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: ${PORT:-8080}
      DB_DSN: ${DB_DSN}
      DATABASE_NAME: ${DATABASE_NAME}
      API_KEY: ${API_KEY}
      ADMIN_KEY: ${ADMIN_KEY}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-5}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-5}
    volumes:
      - logs:/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  logs:
